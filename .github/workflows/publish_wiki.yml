# Mirrors wiki/*.md to the GitHub Wiki tab (HCDE.wiki.git).
# Uses strategy "init" so the wiki repo is created even if no manual page exists yet.
name: Publish wiki

on:
  push:
    branches: [main]
    paths:
      - wiki/**
      - .github/workflows/publish_wiki.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          path: wiki
          strategy: init
          commit-message: Sync wiki from ${{ github.sha }}
