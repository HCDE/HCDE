<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2200 700" role="img" aria-labelledby="title desc">
  <title id="title">HCDE logo</title>
  <desc id="desc">Wide HCDE project banner with a dark background, neon frame, and bold HCDE wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b12"/>
      <stop offset="0.45" stop-color="#101724"/>
      <stop offset="1" stop-color="#05070c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58f0ff"/>
      <stop offset="0.5" stop-color="#2bb7ff"/>
      <stop offset="1" stop-color="#ffb347"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.35" stop-color="#8fe9ff"/>
      <stop offset="0.7" stop-color="#2cd0ff"/>
      <stop offset="1" stop-color="#ffc56b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="2200" height="700" fill="url(#bg)"/>
  <rect width="2200" height="700" fill="url(#grid)"/>

  <g opacity="0.18">
    <circle cx="280" cy="150" r="160" fill="none" stroke="#58f0ff" stroke-width="8"/>
    <circle cx="280" cy="150" r="220" fill="none" stroke="#ffb347" stroke-width="4"/>
    <circle cx="1930" cy="560" r="170" fill="none" stroke="#58f0ff" stroke-width="6"/>
  </g>

  <g filter="url(#shadow)">
    <g transform="translate(90 120)">
      <polygon points="190,0 340,87 340,260 190,347 40,260 40,87" fill="none" stroke="url(#accent)" stroke-width="20"/>
      <polygon points="190,34 310,103 310,244 190,313 70,244 70,103" fill="#09101a" stroke="#3df2ff" stroke-opacity="0.35" stroke-width="6"/>
      <path d="M110 105 H165 V175 H215 V105 H270 V242 H215 V210 H165 V242 H110 Z" fill="url(#wordmark)"/>
      <path d="M110 105 H165 V175 H215 V105 H270 V242 H215 V210 H165 V242 H110 Z" fill="none" stroke="#000000" stroke-opacity="0.28" stroke-width="6"/>
    </g>

    <g transform="translate(470 205)">
      <text x="0" y="150" fill="url(#wordmark)" stroke="#000000" stroke-opacity="0.35" stroke-width="8"
            font-family="Impact, 'Arial Black', 'Segoe UI Black', sans-serif" font-size="190" letter-spacing="10">HCDE</text>
      <text x="10" y="220" fill="#d7e3ef" opacity="0.92"
            font-family="'Segoe UI', Arial, sans-serif" font-size="42" letter-spacing="6">
        STANDALONE DOOM ENGINE
      </text>
      <text x="10" y="285" fill="#9ad6ff" opacity="0.88"
            font-family="'Segoe UI', Arial, sans-serif" font-size="30" letter-spacing="2">
        COMPATIBILITY  •  MOD SUPPORT  •  NETWORKING  •  MODERN RENDERING
      </text>
    </g>
  </g>

  <g opacity="0.72">
    <path d="M 90 610 L 2100 610" stroke="url(#accent)" stroke-width="3"/>
    <path d="M 90 615 L 2100 615" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  </g>
</svg>
