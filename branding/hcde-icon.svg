<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">HCDE icon</title>
  <desc id="desc">Square HCDE icon built from a hex frame and an H mark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061019"/>
      <stop offset="0.6" stop-color="#0b1622"/>
      <stop offset="1" stop-color="#04070c"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#71f2ff"/>
      <stop offset="0.55" stop-color="#2bc0ff"/>
      <stop offset="1" stop-color="#ffb85a"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fdff"/>
      <stop offset="0.5" stop-color="#a2ecff"/>
      <stop offset="1" stop-color="#4dd6ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.34" r="0.72">
      <stop offset="0" stop-color="#33d8ff" stop-opacity="0.32"/>
      <stop offset="0.6" stop-color="#33d8ff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#33d8ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="180" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="180" fill="url(#glow)"/>

  <g filter="url(#shadow)">
    <polygon points="512,132 806,302 806,644 512,814 218,644 218,302" fill="none" stroke="url(#frame)" stroke-width="26"/>
    <polygon points="512,170 770,320 770,626 512,776 254,626 254,320" fill="#09111a" stroke="#19334a" stroke-opacity="0.5" stroke-width="8"/>

    <g>
      <rect x="320" y="300" width="92" height="424" rx="28" fill="url(#mark)" stroke="#000000" stroke-opacity="0.28" stroke-width="8"/>
      <rect x="612" y="300" width="92" height="424" rx="28" fill="url(#mark)" stroke="#000000" stroke-opacity="0.28" stroke-width="8"/>
      <rect x="412" y="470" width="200" height="84" rx="24" fill="url(#mark)" stroke="#000000" stroke-opacity="0.28" stroke-width="8"/>
    </g>

    <path d="M358 338 L392 302 L472 302 L438 338 Z" fill="#ffffff" fill-opacity="0.16"/>
    <path d="M654 338 L688 302 L724 302 L690 338 Z" fill="#ffffff" fill-opacity="0.16"/>
  </g>
</svg>
