<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">HCDE icon</title>
  <desc id="desc">Transparent HCDE hex badge icon with an H mark.</desc>
  <defs>
    <linearGradient id="frame" x1="160" y1="148" x2="864" y2="876" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7bf6ff"/>
      <stop offset="0.52" stop-color="#26c8ff"/>
      <stop offset="1" stop-color="#f5d890"/>
    </linearGradient>
    <linearGradient id="innerStroke" x1="254" y1="230" x2="770" y2="794" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#49e7ff"/>
      <stop offset="1" stop-color="#102b37"/>
    </linearGradient>
    <linearGradient id="mark" x1="320" y1="282" x2="704" y2="740" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8feff"/>
      <stop offset="0.48" stop-color="#bbf3ff"/>
      <stop offset="0.78" stop-color="#57d7ff"/>
      <stop offset="1" stop-color="#f3c873"/>
    </linearGradient>
    <filter id="badgeShadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#000000" flood-opacity="0.46"/>
    </filter>
    <filter id="markShadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="12" stdDeviation="11" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <g filter="url(#badgeShadow)">
    <polygon points="512,126 845,318 845,706 512,898 179,706 179,318" fill="url(#frame)"/>
    <polygon points="512,176 802,344 802,680 512,848 222,680 222,344" fill="#061018" fill-opacity="0.82"/>
    <polygon points="512,214 760,358 760,666 512,810 264,666 264,358" fill="#07141d" fill-opacity="0.66" stroke="url(#innerStroke)" stroke-width="10"/>
    <polygon points="512,250 722,372 722,652 512,774 302,652 302,372" fill="none" stroke="#50ebff" stroke-opacity="0.42" stroke-width="6"/>
  </g>

  <g filter="url(#markShadow)">
    <path d="M312 300 H436 V462 H588 V300 H712 V724 H588 V552 H436 V724 H312 Z" fill="url(#mark)"/>
    <path d="M338 326 H410 V488 H614 V326 H686 V698 H614 V526 H410 V698 H338 Z" fill="#ffffff" fill-opacity="0.18"/>
    <path d="M436 300 H486 L436 350 Z" fill="#ffffff" fill-opacity="0.24"/>
    <path d="M712 300 H762 L712 350 Z" fill="#f5d890" fill-opacity="0.28"/>
  </g>
</svg>
